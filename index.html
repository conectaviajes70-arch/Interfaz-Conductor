<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conecta Conductor PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<style>
body { margin:0; background:#05070d; font-family:Arial; }
#map { width:100%; height:100vh; }

/* PANEL */
.top-panel {
  position:absolute; top:20px; left:50%;
  transform:translateX(-50%);
  background:rgba(20,20,30,0.7);
  padding:10px 20px;
  border-radius:20px;
  color:#fff;
  box-shadow:0 0 15px #00cfff;
}

/* BOTÓN */
.connect-btn {
  position:absolute; bottom:30px; left:50%;
  transform:translateX(-50%);
  padding:18px 40px;
  border-radius:30px;
  border:none;
  color:#fff;
  font-size:18px;
  background:linear-gradient(135deg,#00cfff,#0066ff);
  box-shadow:0 0 20px #00cfff;
}

/* UBICACIÓN */
#ubicacionBtn {
  position:absolute; bottom:110px; right:20px;
  width:55px; height:55px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:rgba(20,20,30,0.8);
  color:#00cfff;
  box-shadow:0 0 15px #00cfff;
}

/* TARJETA */
.trip-card {
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  background:rgba(15,15,25,0.95);
  border-radius:20px;
  padding:20px;
  color:white;
  box-shadow:0 0 25px #00cfff;
  display:none;
}

.price {
  font-size:34px;
  color:#00cfff;
  font-weight:bold;
}

.user {
  display:flex; align-items:center; margin-top:10px;
}

.avatar {
  width:40px;height:40px;border-radius:50%;
  background:#00cfff;
  display:flex;align-items:center;justify-content:center;
  margin-right:10px;
}

.trip-buttons {
  display:flex; justify-content:space-between; margin-top:15px;
}

.accept { background:#00cfff; border:none; padding:10px 20px; border-radius:10px; }
.reject { background:#ff3b3b; border:none; padding:10px 20px; border-radius:10px; }

.timer { text-align:right; margin-top:10px; }

@keyframes pulso {
  0% { transform:scale(1); opacity:1; }
  70% { transform:scale(2.5); opacity:0; }
  100% { transform:scale(1); opacity:0; }
}
</style>
</head>

<body>

<div id="map"></div>
<button id="ubicacionBtn">📍</button>

<div class="top-panel" id="ganancias">$0.00 hoy</div>

<button class="connect-btn" id="btnConexion">Conectarse</button>

<div class="trip-card" id="tripCard">
  <div class="price" id="precio">$0</div>

  <div class="user">
    <div class="avatar">👤</div>
    <div id="usuarioInfo">⭐ 0 | 🚗 0 viajes</div>
  </div>

  <p id="origenTxt"></p>
  <p id="destinoTxt"></p>

  <div class="trip-buttons">
    <button class="accept" onclick="aceptarViaje()">Aceptar</button>
    <button class="reject" onclick="cerrarViaje()">Rechazar</button>
  </div>

  <div class="timer">⏳ <span id="countdown">15</span>s</div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiMzkxODM2IiwiYSI6ImNtbXl4dWZoNzAyamwycm9pZHBoYjNpNzEifQ.ryQd-8yPv1gX6BkNsToW_A';

const map = new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/mapbox/navigation-night-v1',
  center:[-99.1332,19.4326],
  zoom:12
});

let driverCoords=null;
let conectado=false;
let polling=null;
let marcadorUsuario, marcadorA, marcadorB;

// GANANCIAS
let ganancias = parseFloat(localStorage.getItem("ganancias")) || 0;
actualizarGanancias();

function actualizarGanancias(){
  document.getElementById("ganancias").innerText = `$${ganancias.toFixed(2)} hoy`;
  localStorage.setItem("ganancias", ganancias);
}

// UBICACIÓN TIEMPO REAL
navigator.geolocation.watchPosition(pos=>{
  driverCoords=[pos.coords.longitude,pos.coords.latitude];
});

// BOTÓN UBICACIÓN
document.getElementById("ubicacionBtn").onclick=()=>{
  if(!driverCoords) return;
  map.flyTo({ center:driverCoords, zoom:15 });
};

// BOTÓN CONEXIÓN
document.getElementById("btnConexion").onclick=()=>{
  conectado=!conectado;
  const btn=document.getElementById("btnConexion");

  if(conectado){
    btn.innerText="Desconectarse";
    btn.style.background="#ff3b3b";
    iniciarBusqueda();
  }else{
    btn.innerText="Conectarse";
    btn.style.background="linear-gradient(135deg,#00cfff,#0066ff)";
    detenerBusqueda();
  }
};

// SIMULACIÓN BACKEND (CAMBIAR)
async function obtenerViaje(){
  return {
    precio:85,
    usuario:{rating:4.93, viajes:120},
    origen:{coords:[-99.14,19.43], dir:"Roma Norte", tiempo:"4 min", dist:"520 m"},
    destino:{coords:[-99.20,19.40], dir:"Polanco", tiempo:"12 min", dist:"2.1 km"}
  };
}

// LOOP
function iniciarBusqueda(){
  polling=setInterval(async()=>{
    if(!driverCoords) return;
    const viaje=await obtenerViaje();
    if(viaje) mostrarViaje(viaje);
  },5000);
}

function detenerBusqueda(){
  clearInterval(polling);
}

// MOSTRAR VIAJE
async function mostrarViaje(v){
  document.getElementById("tripCard").style.display="block";

  document.getElementById("precio").innerText=`$${v.precio}`;
  document.getElementById("usuarioInfo").innerText=`⭐ ${v.usuario.rating} | 🚗 ${v.usuario.viajes} viajes`;

  document.getElementById("origenTxt").innerText=`📍 ${v.origen.tiempo} (${v.origen.dist}) - ${v.origen.dir}`;
  document.getElementById("destinoTxt").innerText=`🏁 ${v.destino.tiempo} (${v.destino.dist}) - ${v.destino.dir}`;

  dibujarRutas(v);
  iniciarTimer();
}

// RUTAS
async function dibujarRutas(v){

  const r1=await fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${driverCoords[0]},${driverCoords[1]};${v.origen.coords[0]},${v.origen.coords[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`).then(r=>r.json());

  const r2=await fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${v.origen.coords[0]},${v.origen.coords[1]};${v.destino.coords[0]},${v.destino.coords[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`).then(r=>r.json());

  pintarRuta("pickup", r1.routes[0].geometry, "#00ff9f");
  pintarRuta("trip", r2.routes[0].geometry, "#00cfff");

  marcadorA = new mapboxgl.Marker({color:"#00ff9f"}).setLngLat(v.origen.coords).addTo(map);
  marcadorB = new mapboxgl.Marker({color:"#ff3b3b"}).setLngLat(v.destino.coords).addTo(map);
}

function pintarRuta(id,geo,color){
  if(map.getSource(id)){
    map.getSource(id).setData(geo);
  }else{
    map.addSource(id,{type:"geojson",data:geo});
    map.addLayer({id:id,type:"line",source:id,paint:{ "line-color":color,"line-width":5 }});
  }
}

// TIMER
let timer;
function iniciarTimer(){
  let t=15;
  document.getElementById("countdown").innerText=t;

  timer=setInterval(()=>{
    t--;
    document.getElementById("countdown").innerText=t;
    if(t<=0) cerrarViaje();
  },1000);
}

// ACEPTAR
function aceptarViaje(){
  const precio = parseFloat(document.getElementById("precio").innerText.replace("$",""));
  ganancias += precio;
  actualizarGanancias();
  cerrarViaje();
}

// CERRAR
function cerrarViaje(){
  document.getElementById("tripCard").style.display="none";
  clearInterval(timer);
}
</script>

</body>
</html>
