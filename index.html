<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conecta Conductor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #05070d;
}

#map {
  width: 100%;
  height: 100vh;
}

/* PANEL SUPERIOR */
.top-panel {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,30,0.7);
  padding: 10px 20px;
  border-radius: 20px;
  color: #fff;
  font-size: 18px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 15px #00cfff;
}

/* BOTÓN CONECTARSE */
.connect-btn {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #00cfff, #0066ff);
  padding: 18px 40px;
  border-radius: 30px;
  color: white;
  font-size: 18px;
  border: none;
  box-shadow: 0 0 20px #00cfff;
}

/* BOTONES LATERALES */
.side-btn {
  position: absolute;
  right: 15px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(20,20,30,0.7);
  backdrop-filter: blur(10px);
  margin-top: 10px;
}

/* TARJETA DE VIAJE */
.trip-card {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  background: rgba(15,15,25,0.95);
  border-radius: 20px;
  padding: 20px;
  color: white;
  box-shadow: 0 0 25px #00cfff;
  display: none;
}

.trip-card h3 {
  margin: 0;
  color: #00cfff;
}

.trip-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.accept {
  background: #00cfff;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
}

.reject {
  background: #ff3b3b;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
}

.timer {
  margin-top: 10px;
  text-align: right;
  color: #aaa;
}
</style>

</head>

<body>

<div id="map"></div>

<div class="top-panel">$1,250 hoy ▼</div>

<button class="connect-btn" onclick="simularViaje()">Conectarse</button>

<div class="trip-card" id="tripCard">
  <h3>Nuevo viaje</h3>
  <p>📍 Roma Norte → Polanco</p>
  <p>💰 $85 | 📏 5.2 km | ⏱️ 12 min</p>

  <div class="trip-buttons">
    <button class="accept">Aceptar</button>
    <button class="reject" onclick="cerrarViaje()">Rechazar</button>
  </div>

  <div class="timer">⏳ <span id="countdown">15</span>s</div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiMzkxODM2IiwiYSI6ImNtbXl4dWZoNzAyamwycm9pZHBoYjNpNzEifQ.ryQd-8yPv1gX6BkNsToW_A';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/navigation-night-v1',
  center: [-99.1332, 19.4326],
  zoom: 12
});

let timer;

function simularViaje() {
  const card = document.getElementById("tripCard");
  const countdown = document.getElementById("countdown");

  card.style.display = "block";

  let tiempo = 15;
  countdown.innerText = tiempo;

  timer = setInterval(() => {
    tiempo--;
    countdown.innerText = tiempo;

    if (tiempo <= 0) {
      cerrarViaje();
    }
  }, 1000);
}

function cerrarViaje() {
  document.getElementById("tripCard").style.display = "none";
  clearInterval(timer);
}
</script>

</body>
</html>
